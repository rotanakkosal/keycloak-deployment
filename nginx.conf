################################## keycloak #################################

server {
    server_name keycloak.kshrd.app;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name keycloak.kshrd.app;

    # SSL configuration managed by Certbot
    ssl_certificate /etc/letsencrypt/live/keycloak.kshrd.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/keycloak.kshrd.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://165.22.244.160:8100; # Keycloak is hosted on this internal IP at port 8100
        proxy_set_header Host $http_host; # Pass the host header - in this case, the domain name
        proxy_set_header X-Real-IP $remote_addr; # The real IP of the client
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Forward the real client IP for logging on the backend
        proxy_set_header X-Forwarded-Proto $scheme; # The scheme used by the client (https or http)
        proxy_set_header X-Forwarded-Port $server_port; # The port the client connected to
    }
}
